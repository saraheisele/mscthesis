# Default value of indentation
defaultIndent: "  "
modifyLineBreaks:
  preserveBlankLines: 1 # 0/1
  condenseMultipleBlankLinesInto: 1 # 0/1
  oneSentencePerLine:
    manipulateSentences: 0 # 0/1
    removeSentenceLineBreaks: 1 # 0/1
    multipleSpacesToSingle: 1 # 0/1
    textWrapSentences: 0 # 1 disables main textWrap
    sentenceIndent: ""
    sentencesFollow:
      par: 1 # 0/1
      blankLine: 1 # 0/1
      fullStop: 1 # 0/1
      exclamationMark: 1 # 0/1
      questionMark: 1 # 0/1
      rightBrace: 1 # 0/1
      commentOnPreviousLine: 1 # 0/1
      other: 0 # regex
    sentencesBeginWith:
      A-Z: 1 # 0/1
      a-z: 0 # 0/1
      other: 0 # regex
    sentencesEndWith:
      basicFullStop: 0 # 0/1
      betterFullStop: 1 # 0/1
      exclamationMark: 1 # 0/1
      questionMark: 1 # 0/1
      other: 0 # regex
    sentencesDoNOTcontain:
      other: \\begin # regex
  textWrapOptions:
    columns: 80
